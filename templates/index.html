<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flake Buster - PR CI Dashboard</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👻</text></svg>">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="sidebar">
        <h1>👻🚫 Flake Buster</h1>
        <button class="btn" id="refresh-btn">Refresh</button>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <input type="text" id="search-input" class="search-input" placeholder="Loading default query..." style="flex: 1;">
            <button class="btn" id="search-btn">Search</button>
        </div>

        <div id="auth-banner" class="banner hidden"></div>

        <div class="container">

            <div id="pr-cards-container"></div>

            <button class="btn btn-secondary hidden" id="load-more-btn">
                Load More - <span id="load-more-text">showing 0 of 0</span>
            </button>
        </div>

        <div class="toast-container" id="toast-container"></div>
    </div>

    <div id="contextMenu" class="context-menu" style="display: none;">
        <div class="context-menu-item" id="clearPermafailItem">Clear permafail</div>
        <div class="context-menu-item" id="forceReanalyzeItem">Force Re-analyze</div>
    </div>

    <!-- Terminal Modal for Analysis Progress -->
    <div id="terminalModal" class="terminal-modal" style="display: none;">
        <div class="terminal-content">
            <div class="terminal-header">
                <span>Claude CLI Analysis</span>
                <button class="terminal-close" id="terminalClose">&times;</button>
            </div>
            <div class="terminal-body" id="terminalBody"></div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
